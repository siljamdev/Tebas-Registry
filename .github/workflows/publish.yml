name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Tebas
        run: |
          curl -fL https://github.com/siljamdev/Tebas/releases/latest/download/tebas_linux-x64 -o tebas
          chmod +x tebas

      - name: Build templates
        run: |
          failed=0
          
          mkdir -p built/templates
          for dir in templates/*/; do
            name=$(basename "$dir")
            echo "Building template: $name"
            ./tebas template build "$dir" "built/templates"
            if [ $? -eq 0 ]; then
              echo "  ✅ $name"
            else
              echo "  ❌ $name"
              failed=1
            fi
          done
          
          mkdir -p built/plugins
          for dir in plugins/*/; do
            name=$(basename "$dir")
            echo "Building plugin: $name"
            ./tebas plugin build "$dir" "built/plugins"
            if [ $? -eq 0 ]; then
              echo "  ✅ $name"
            else
              echo "  ❌ $name"
              failed=1
            fi
          done
          
          exit $failed

      - name: Upload built files
        uses: actions/upload-artifact@v6
        with:
          name: built
          path: |
            built/templates/
            built/plugins/
          if-no-files-found: warn

  publish:
    needs: [build]
    if: github.event_name == 'push' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built files
        uses: actions/download-artifact@v8
        with:
          name: built
          path: built/
      
      - name: Get Tebas version
        id: version
        run: |
          VERSION=$(curl -fL -H "User-Agent: TebasRegistry" \
            https://api.github.com/repos/siljamdev/Tebas/releases/latest \
            | grep '"tag_name"' | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{steps.version.outputs.version}}-${{github.run_number}}
          name: ${{steps.version.outputs.version}}-${{github.run_number}}
          make_latest: true
          files: |
            built/templates/*
            built/plugins/*
          body: "Latest successfully built templates and plugins."

  readme:
    needs: [build]
    if: github.event_name == 'push' && needs.build-templates.result == 'success' && needs.build-plugins.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      - name: Generate README
        run: |
          chmod +x generate_readme.sh
          ./generate_readme.sh
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Auto-generate README"
          git push